name: Set up build toolchain
description: Java, Go, gomobile, Android NDK, and Gradle for building Bedlam.
runs:
  using: composite
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"
    - uses: actions/setup-go@v5
      with:
        go-version: "1.25"
        cache-dependency-path: hysteria/golib/go.sum
    - name: Install gomobile and gobind
      shell: bash
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: Point Gradle at the runner NDK
      shell: bash
      run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
    - uses: gradle/actions/setup-gradle@v4
