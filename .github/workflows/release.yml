# Builds signed per-ABI APKs on a v* tag and publishes a GitHub release.
# Release notes come from release-notes/<version>.md (version = tag without the v).
# Secrets (optional; without them the build is unsigned):
#   BEDLAM_STORE_BASE64    base64 of the keystore (base64 -w0 keystore.jks)
#   BEDLAM_STORE_PASSWORD  keystore password
#   BEDLAM_KEY_ALIAS       key alias
#   BEDLAM_KEY_PASSWORD    key password
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      HAS_KEYSTORE: ${{ secrets.BEDLAM_STORE_BASE64 != '' }}
      ORG_GRADLE_PROJECT_BEDLAM_STORE_PASSWORD: ${{ secrets.BEDLAM_STORE_PASSWORD }}
      ORG_GRADLE_PROJECT_BEDLAM_KEY_ALIAS: ${{ secrets.BEDLAM_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_BEDLAM_KEY_PASSWORD: ${{ secrets.BEDLAM_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build

      - name: Resolve version
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KS: ${{ secrets.BEDLAM_STORE_BASE64 }}
        run: |
          echo "$KS" | base64 -d > "$RUNNER_TEMP/upload.jks"
          echo "ORG_GRADLE_PROJECT_BEDLAM_STORE_FILE=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"

      - name: Build per-ABI APKs
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/bedlam-*.apk
            app/build/outputs/apk/release/output-metadata.json
          body_path: release-notes/${{ steps.ver.outputs.name }}.md
          fail_on_unmatched_files: true
